version: 2

sources:
  - name: raw
    database: ECOMMERCE_DB
    schema: RAW
    description: "Raw Olist e-commerce data loaded from S3 via COPY INTO."
    freshness:
      warn_after:  {count: 25, period: hour}
      error_after: {count: 49, period: hour}
    loaded_at_field: _loaded_at

    tables:
      - name: olist_orders
        description: "One row per order. Central fact of the dataset."
        columns:
          - name: order_id
            tests: [unique, not_null]
          - name: customer_id
            tests: [not_null]
          - name: order_status
            tests:
              - accepted_values:
                  values: ['delivered', 'shipped', 'canceled', 'invoiced',
                           'processing', 'approved', 'unavailable', 'created']

      - name: olist_order_items
        description: "Line items within each order."
        columns:
          - name: order_id
            tests: [not_null]
          - name: order_item_id
            tests: [not_null]
          - name: product_id
            tests: [not_null]

      - name: olist_order_payments
        description: "Payment records; an order can have multiple payment rows."
        columns:
          - name: order_id
            tests: [not_null]
          - name: payment_type
            tests:
              - accepted_values:
                  values: ['credit_card', 'boleto', 'voucher', 'debit_card', 'not_defined']

      - name: olist_order_reviews
        description: "Customer reviews tied to delivered orders."
        columns:
          - name: review_id
            tests: [not_null]
          - name: review_score
            tests:
              - accepted_values:
                  values: [1, 2, 3, 4, 5]

      - name: olist_customers
        description: "Customer master with zip code and state."
        columns:
          - name: customer_id
            tests: [unique, not_null]

      - name: olist_products
        description: "Product catalog with category and dimensions."
        columns:
          - name: product_id
            tests: [unique, not_null]

      - name: olist_sellers
        description: "Seller master with location data."
        columns:
          - name: seller_id
            tests: [unique, not_null]

      - name: olist_geolocation
        description: "Zip-code-level latitude/longitude data."

      - name: product_categories
        description: "Portuguese → English category name translation."
        columns:
          - name: product_category_name
            tests: [unique, not_null]
